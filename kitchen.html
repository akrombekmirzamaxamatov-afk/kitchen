<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D0E0F" />
  <title>Oshxona — FASTBIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0D0E0F;
      color: #fff;
      min-height: 100dvh;
    }

    /* ── Header ── */
    .header {
      background: #141516;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1.5px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: #FF3C1F;
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(255,60,31,0.4);
    }

    .logo em { font-style: normal; color: #FFD23F; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .refresh-badge {
      font-size: 11px;
      font-weight: 800;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .refresh-dot {
      width: 7px;
      height: 7px;
      background: #4ADE80;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .btn-clear {
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.2px;
    }

    .btn-clear:hover {
      background: rgba(255,60,31,0.15);
      color: #FF3C1F;
      border-color: rgba(255,60,31,0.3);
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-chip {
      flex-shrink: 0;
      background: #1A1B1D;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 10px 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 90px;
    }

    .stat-chip .val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      line-height: 1;
      color: #fff;
    }

    .stat-chip .lbl {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .stat-chip.active   .val { color: #FFD23F; }
    .stat-chip.cooking  .val { color: #FB923C; }
    .stat-chip.ready    .val { color: #4ADE80; }

    /* ── Main ── */
    .main {
      padding: 4px 16px 40px;
    }

    /* ── Empty state ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 80px 24px;
      text-align: center;
    }

    .empty-icon {
      font-size: 64px;
      filter: grayscale(1);
      opacity: 0.3;
    }

    .empty h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.25);
    }

    .empty p {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.15);
    }

    /* ── Order grid ── */
    .orders-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 600px)  { .orders-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .orders-grid { grid-template-columns: repeat(3, 1fr); } }

    /* ── Order card ── */
    .order-card {
      background: #1A1B1D;
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.25s, box-shadow 0.25s;
      animation: cardIn 0.3s ease both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .order-card.status-new     { border-color: rgba(255,210,63,0.35);  box-shadow: 0 0 0 0 rgba(255,210,63,0.0); animation: cardIn 0.3s ease both, pulseNew 2s 0.3s ease-in-out 3; }
    .order-card.status-cooking { border-color: rgba(251,146,60,0.4);  box-shadow: 0 4px 20px rgba(251,146,60,0.1); }
    .order-card.status-ready   { border-color: rgba(74,222,128,0.4);  box-shadow: 0 4px 20px rgba(74,222,128,0.1); opacity: 0.7; }

    @keyframes pulseNew {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,210,63,0.0); }
      50%       { box-shadow: 0 0 0 6px rgba(255,210,63,0.2); }
    }

    /* Card header */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .table-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .table-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      line-height: 1;
      color: #fff;
    }

    .table-tag {
      display: flex;
      flex-direction: column;
    }

    .table-tag .tag-label {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    .table-tag .tag-time {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
    }

    /* Status badge */
    .status-badge {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 999px;
    }

    .badge-new     { background: rgba(255,210,63,0.15); color: #FFD23F; }
    .badge-cooking { background: rgba(251,146,60,0.15); color: #FB923C; }
    .badge-ready   { background: rgba(74,222,128,0.15); color: #4ADE80; }

    /* Items list */
    .card-items {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .order-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .item-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item-qty {
      width: 26px;
      height: 26px;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 900;
      color: #fff;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .item-name {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
    }

    .item-price {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }

    /* Card footer */
    .card-footer {
      padding: 12px 16px 14px;
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .total-wrap { display: flex; flex-direction: column; gap: 1px; }

    .total-label {
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .total-amount {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      line-height: 1;
      color: #fff;
    }

    /* Action buttons */
    .card-actions {
      display: flex;
      gap: 7px;
    }

    .btn-action {
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.3px;
      padding: 8px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-action i { font-size: 11px; }

    .btn-cooking {
      background: rgba(251,146,60,0.15);
      color: #FB923C;
      border: 1px solid rgba(251,146,60,0.25);
    }

    .btn-cooking:hover {
      background: rgba(251,146,60,0.28);
    }

    .btn-ready {
      background: rgba(74,222,128,0.15);
      color: #4ADE80;
      border: 1px solid rgba(74,222,128,0.25);
    }

    .btn-ready:hover {
      background: rgba(74,222,128,0.28);
    }

    .btn-action:active { transform: scale(0.92); }
    .btn-action:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">🔥</div>
      FAST<em>BIT</em>
    </div>
    <div class="header-right">
      <div class="refresh-badge">
        <div class="refresh-dot"></div>
        JONLI
      </div>
      <button class="btn-clear" onclick="clearOrders()">
        <i class="fa-solid fa-trash-can"></i> Tozalash
      </button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip active">
      <span class="val" id="statTotal">0</span>
      <span class="lbl">Jami</span>
    </div>
    <div class="stat-chip cooking">
      <span class="val" id="statCooking">0</span>
      <span class="lbl">Tayyorlanmoqda</span>
    </div>
    <div class="stat-chip ready">
      <span class="val" id="statReady">0</span>
      <span class="lbl">Tayyor</span>
    </div>
  </div>

  <!-- Orders -->
  <main class="main">
    <div class="orders-grid" id="ordersGrid"></div>
  </main>

  <script>
    /* ── Status store (survives refresh) ── */
    function getStatuses() {
      try { return JSON.parse(localStorage.getItem('order_statuses') || '{}'); }
      catch { return {}; }
    }

    function saveStatus(orderId, status) {
      const s = getStatuses();
      s[orderId] = status;
      localStorage.setItem('order_statuses', JSON.stringify(s));
    }

    /* ── Format price ── */
    function fmt(n) {
      return Number(n).toLocaleString('uz-UZ') + " so'm";
    }

    /* ── Format time ── */
    function fmtTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleTimeString('uz-UZ', { hour: '2-digit', minute: '2-digit' });
    }

    /* ── Render ── */
    function render() {
      let orders = [];
      try { orders = JSON.parse(localStorage.getItem('orders') || '[]'); } catch {}

      const statuses = getStatuses();
      const grid     = document.getElementById('ordersGrid');

      /* stats */
      const total   = orders.length;
      const cooking = orders.filter(o => statuses[o.id || o.timestamp] === 'cooking').length;
      const ready   = orders.filter(o => statuses[o.id || o.timestamp] === 'ready').length;

      document.getElementById('statTotal').textContent   = total;
      document.getElementById('statCooking').textContent = cooking;
      document.getElementById('statReady').textContent   = ready;

      if (total === 0) {
        grid.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <div class="empty-icon">🍽️</div>
            <h2>Buyurtma yo'q</h2>
            <p>Yangi buyurtmalar bu yerda ko'rinadi</p>
          </div>`;
        return;
      }

      /* preserve scroll */
      const scrollY = window.scrollY;

      grid.innerHTML = '';

      /* newest first */
      [...orders].reverse().forEach((order, idx) => {
        const oid    = order.id || order.timestamp || idx;
        const status = statuses[oid] || 'new';

        const badgeMap = {
          new:     '<span class="status-badge badge-new">Yangi</span>',
          cooking: '<span class="status-badge badge-cooking">Tayyorlanmoqda</span>',
          ready:   '<span class="status-badge badge-ready">Tayyor ✓</span>',
        };

        const items = (order.items || []).map(item => `
          <div class="order-item">
            <div class="item-left">
              <div class="item-qty">${item.qty}</div>
              <div class="item-name">${item.name}</div>
            </div>
            <div class="item-price">${fmt(item.price * item.qty)}</div>
          </div>
        `).join('');

        const card = document.createElement('div');
        card.className = `order-card status-${status}`;
        card.style.animationDelay = `${idx * 50}ms`;
        card.dataset.oid = oid;

        card.innerHTML = `
          <div class="card-header">
            <div class="table-info">
              <div class="table-num">${order.table || '—'}</div>
              <div class="table-tag">
                <span class="tag-label">Stol</span>
                <span class="tag-time">${fmtTime(order.timestamp)}</span>
              </div>
            </div>
            ${badgeMap[status] || badgeMap.new}
          </div>

          <div class="card-items">
            ${items || '<div class="item-name" style="opacity:.4">Mahsulot yo\'q</div>'}
          </div>

          <div class="card-footer">
            <div class="total-wrap">
              <span class="total-label">Jami summa</span>
              <span class="total-amount">${fmt(order.grandTotal || 0)}</span>
            </div>
            <div class="card-actions">
              <button
                class="btn-action btn-cooking"
                onclick="setStatus('${oid}', 'cooking')"
                ${status === 'cooking' || status === 'ready' ? 'disabled' : ''}
              >
                <i class="fa-solid fa-fire-burner"></i> Tayyorlanmoqda
              </button>
              <button
                class="btn-action btn-ready"
                onclick="setStatus('${oid}', 'ready')"
                ${status === 'ready' ? 'disabled' : ''}
              >
                <i class="fa-solid fa-bell-concierge"></i> Tayyor
              </button>
            </div>
          </div>
        `;

        grid.appendChild(card);
      });

      window.scrollTo({ top: scrollY });
    }

    /* ── Actions ── */
    function setStatus(oid, status) {
      saveStatus(oid, status);
      render();
    }

    function clearOrders() {
      if (!confirm('Barcha buyurtmalarni o\'chirasizmi?')) return;
      localStorage.removeItem('orders');
      localStorage.removeItem('order_statuses');
      render();
    }

    /* ── Demo seed (remove in production) ── */
    function seedIfEmpty() {
      const existing = JSON.parse(localStorage.getItem('orders') || '[]');
      if (existing.length > 0) return;

      const demo = [
        {
          id: 'demo-1',
          table: '5',
          timestamp: new Date(Date.now() - 4 * 60000).toISOString(),
          items: [
            { name: 'Classic Cheese Burger', qty: 2, price: 35000 },
            { name: 'French Fries',          qty: 1, price: 15000 },
            { name: 'Pepsi 0.5L',            qty: 2, price: 8000  },
          ],
          grandTotal: 101000,
        },
        {
          id: 'demo-2',
          table: '12',
          timestamp: new Date(Date.now() - 9 * 60000).toISOString(),
          items: [
            { name: 'Chicken Lavash', qty: 3, price: 28000 },
            { name: 'Fresh Lemonade', qty: 3, price: 14000 },
          ],
          grandTotal: 126000,
        },
        {
          id: 'demo-3',
          table: '3',
          timestamp: new Date(Date.now() - 1 * 60000).toISOString(),
          items: [
            { name: 'Double Smash Burger', qty: 1, price: 52000 },
            { name: 'Onion Rings',         qty: 2, price: 12000 },
          ],
          grandTotal: 76000,
        },
      ];

      localStorage.setItem('orders', JSON.stringify(demo));
    }

    /* ── Init + auto-refresh ── */
    seedIfEmpty();
    render();
    setInterval(render, 3000);
  </script>

</body>
</html>
